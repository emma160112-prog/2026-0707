<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drone Soccer 無人機足球</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Microsoft JhengHei",sans-serif;
}

body{
    background:linear-gradient(180deg,#6fd3ff,#dff8ff);
    overflow-x:hidden;
}

header{
    background:#1e90ff;
    color:white;
    text-align:center;
    padding:40px;
    border-bottom:8px solid white;
}

header h1{
    font-size:48px;
}

header p{
    font-size:20px;
    margin-top:10px;
}

.hero{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:50px;
    padding:80px;
    flex-wrap:wrap;
}

.drone{
    width:260px;
    animation:float 3s ease-in-out infinite;
}

@keyframes float{
    0%{transform:translateY(0);}
    50%{transform:translateY(-18px);}
    100%{transform:translateY(0);}
}

.content{
    max-width:500px;
}

.content h2{
    color:#1565c0;
    margin-bottom:20px;
}

.content p{
    font-size:18px;
    line-height:1.8;
}

button{
    margin-top:25px;
    background:#ff9800;
    color:white;
    border:none;
    padding:15px 35px;
    border-radius:40px;
    cursor:pointer;
    font-size:20px;
    transition:.3s;
}

button:hover{
    transform:scale(1.08);
    background:#ff5722;
}

.section{
    padding:60px;
    text-align:center;
}

.card{
    display:inline-block;
    width:300px;
    background:white;
    border-radius:20px;
    padding:25px;
    margin:20px;
    box-shadow:0 10px 25px rgba(0,0,0,.15);
}

.card h3{
    color:#2196f3;
}

footer{
    background:#1e90ff;
    color:white;
    text-align:center;
    padding:20px;
}
</style>

</head>

<body>

<header>
<h1>⚽ Drone Soccer</h1>
<p>無人機足球體驗館</p>
</header>

<section class="hero">

<img class="drone"
src="https://cdn-icons-png.flaticon.com/512/809/809957.png">

<div class="content">
<h2>飛行 × 足球 × 科技</h2>

<p>
操控無人機穿越球門，
體驗最刺激的科技運動！
適合親子、學生、社團及企業活動。
</p>

<button>立即報名</button>

</div>

</section>

<section class="section">

<h2>特色介紹</h2>

<div class="card">
<h3>🤖 AI飛行訓練</h3>
<p>從零開始學會操控無人機。</p>
</div>

<div class="card">
<h3>⚽ Drone Soccer</h3>
<p>團隊競賽，享受高速對戰。</p>
</div>

<div class="card">
<h3>🏆 比賽活動</h3>
<p>校園、企業、公開賽皆可舉辦。</p>
</div>

</section>

<footer>
© 2026 Drone Soccer Taiwan
</footer>

</body>
</html>
